name: iOS IPA Build (Sideload)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    name: Build Unsigned IPA for Sideloading
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: pod install --repo-update
        working-directory: ios

      # Build the .app WITHOUT archiving — no Developer account needed
      # Output: build/ios/iphoneos/Runner.app
      - name: Build iOS app (no codesign)
        run: flutter build ios --release --no-codesign

      # Manually package Runner.app into a sideloadable IPA
      # This is the standard sideload IPA format (Payload/Runner.app → zipped as .ipa)
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r -9 Aura.ipa Payload
          mkdir -p build/ios/ipa
          mv Aura.ipa build/ios/ipa/Aura.ipa
          echo "IPA packaged at: build/ios/ipa/Aura.ipa"
          ls -lh build/ios/ipa/

      # Upload as workflow artifact — always available without a release
      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aura-unsigned-ipa
          path: build/ios/ipa/Aura.ipa
          retention-days: 30

      # Also upload to GitHub Release when triggered by a version tag
      - name: Upload IPA to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/ios/ipa/Aura.ipa
          asset_name: Aura-unsigned.ipa
          tag: ${{ github.ref_name }}
          overwrite: true
          body: |
            ## Aura Music App — Unsigned IPA

            ✅ Built without code signing — ready for sideloading.

            ### How to sideload to your iPhone:
            1. Download `Aura-unsigned.ipa`
            2. Use **Sideloadly** (Windows) or **AltStore** to install
            3. No Apple Developer account needed!
            
            > Free Apple ID sideloads expire every 7 days and need re-installing.
            > TrollStore users: install permanently with no expiry.
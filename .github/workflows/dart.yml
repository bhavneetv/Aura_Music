name: iOS-ipa-build-new

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter pub get

      - run: pod repo update
        working-directory: ios

      - name: Build iOS (ignore Flutter's post-build signing check)
        run: flutter build ios --release --no-codesign || true

      - name: Show where the app actually landed
        run: find build/ios -maxdepth 4 -iname "Runner.app" -o -iname "*.xcarchive"

      - name: Verify Runner.app was actually produced
        run: |
          APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH — real build failure."
            exit 1
          fi
          echo "Runner.app found at $APP_PATH"

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app Payload/
          zip -qq -r -9 FlutterIpaExport.ipa Payload

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"

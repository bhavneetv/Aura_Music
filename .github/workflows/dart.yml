name: iOS-ipa-build-new

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter pub get

      - run: pod repo update
        working-directory: ios

      # Prepares Generated.xcconfig, runs pod install, WITHOUT
      # attempting Flutter's own final assembly/signing-gated step
      - name: Prepare iOS project (config only, no build)
        run: flutter build ios --release --no-codesign --config-only --no-tree-shake-icons

      - name: Archive via xcodebuild directly (bypasses Flutter's team check)
        run: |
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$PWD/build/Runner.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            archive
        working-directory: ios

      - name: Verify Runner.app and inspect size
        run: |
          APP_PATH="ios/build/Runner.xcarchive/Products/Applications/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH — real build failure."
            find ios/build -maxdepth 4 2>/dev/null
            exit 1
          fi
          echo "--- Size ---"
          du -sh "$APP_PATH"
          echo "--- Contents ---"
          find "$APP_PATH" -maxdepth 2

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -RL "ios/build/Runner.xcarchive/Products/Applications/Runner.app" Payload/
          echo "--- Payload size after copy ---"
          du -sh Payload
          ditto -c -k --keepParent Payload FlutterIpaExport.ipa
          echo "--- Final IPA size ---"
          ls -lh FlutterIpaExport.ipa

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FlutterIpaExport.ipa
          tag: v1.1
          overwrite: true
          body: "This is first release"

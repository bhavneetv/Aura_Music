name: iOS IPA Build (Sideload)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    name: Build Unsigned IPA for Sideloading
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Update CocoaPods repo
        run: pod repo update
        working-directory: ios

      - name: Install Pods
        run: pod install --repo-update
        working-directory: ios

      # Build unsigned IPA — no Apple Developer account needed
      # This produces build/ios/ipa/Aura.ipa (or music_app.ipa)
      - name: Build unsigned IPA
        run: flutter build ipa --release --no-codesign

      # The IPA is created at build/ios/ipa/*.ipa by flutter build ipa
      - name: Locate IPA file
        id: find_ipa
        run: |
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
          echo "Found IPA at: $IPA_PATH"

      # Upload as workflow artifact (always available, no release needed)
      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aura-unsigned-ipa
          path: ${{ steps.find_ipa.outputs.ipa_path }}
          retention-days: 30

      # Also upload to GitHub Release if triggered by a tag
      - name: Upload IPA to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.find_ipa.outputs.ipa_path }}
          asset_name: Aura-unsigned.ipa
          tag: ${{ github.ref_name }}
          overwrite: true
          body: |
            ## Aura Music App — Unsigned IPA
            
            ✅ Build with no code signing — ready for sideloading.
            
            ### How to sideload to your iPhone:
            1. Download `Aura-unsigned.ipa`
            2. Use **AltStore**, **Sideloadly**, or **TrollStore** to install
            3. No Apple Developer account needed!
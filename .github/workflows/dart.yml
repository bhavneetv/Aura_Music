name: iOS-ipa-build-new

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter pub get

      - run: pod repo update
        working-directory: ios

      - name: Build iOS (ignore Flutter's post-build signing check)
        run: flutter build ios --release --no-codesign || true

      - name: Verify Runner.app and inspect size
        run: |
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Runner.app not found at $APP_PATH — real build failure."
            exit 1
          fi
          echo "--- Size ---"
          du -sh "$APP_PATH"
          echo "--- Contents ---"
          find "$APP_PATH" -maxdepth 3

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -RL build/ios/Release-iphoneos/Runner.app Payload/
          echo "--- Payload size after copy ---"
          du -sh Payload
          ditto -c -k --keepParent Payload FlutterIpaExport.ipa
          echo "--- Final IPA size ---"
          ls -lh FlutterIpaExport.ipa

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: FlutterIpaExport.ipa
          tag: v1.0
          overwrite: true
          body: "This is first release"
